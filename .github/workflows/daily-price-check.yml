name: Daily Megekko Price Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

concurrency:
  group: megekko-price-check
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: megekko-price-report
          path: output/

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/price_report.json output/price_report.md output/price_history.json output/price_chart.png
          git diff --cached --quiet && exit 0
          git commit -m "Update daily Megekko price report"
          git push
